interface:
  display_name: "Workspace PR Agent (GitHub MCP + Vercel)"
  short_description: "Run multi-repo PR automation with GitHub MCP review intelligence and Vercel deployment context"
  default_prompt: "Use $workspace-pr-agent-github-mcp to run workspace PR automation in GitHub MCP + Vercel mode: auto-discover the workspace repo plus child repos, keep one PR per repo, wait for checks and deployments, process bot reviews/messages, apply revisions, merge to main, and enforce main parity plus local branch cleanup."
policy:
  allow_implicit_invocation: false
dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP for PR metadata, reviews, and status checks"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp"
    - type: "mcp"
      value: "vercel"
      description: "Vercel MCP for preview deployments, build logs, and deployment readiness during PR cycles"
