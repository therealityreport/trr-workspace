# Canonical runtime roster and phase-order source for the shared Design Docs package.
# `wave` is rollout metadata only. It does not affect runtime ordering.
schema_version: 1
package_version: "1.4.0"
interface:
  display_name: "Design Docs Agent (TRR)"
  short_description: "Generate or update TRR design-docs pages from article URLs, saved source bundles, HTML captures, and source inventories."
  default_prompt: "Use $design-docs-agent to ingest an articleUrl with an optional saved source bundle, acquire a bundle when needed, validate the bundle contract, extract structure and media, and generate or update the matching TRR design-docs pages."
dependencies:
  tools:
    - type: "mcp"
      value: "chrome-devtools"
      description: "Optional browser extraction for embeds, CSS discovery, and computed-style verification"
shared_capabilities:
  - browser.navigate
  - browser.snapshot
  - browser.evaluate
  - browser.network.list
  - browser.network.get
  - browser.screenshot
  - delegate.parallel
  - fs.edit
  - check.typecheck
pipeline:
  - phase: validation
  - phase: pre-extraction
  - phase: extraction
  - phase: generation
  - phase: wiring
  - phase: verification
    members:
      - skill: audit-generated-config-integrity
      - skill: verify-source-fidelity
      - skill: sync-brand-page
      - skill: audit-responsive-accessibility
      - skill: integration-test-runner
      - capability: check.typecheck
skillset:
  version: 5
  supporting:
    - skill: senior-frontend
      source: "skill://senior-frontend"
      role: "App Router, server/client boundaries, rendering conventions"
      phases: [extraction, generation]
      wave: 1
      status: active
      version: "1.0.0"
    - skill: senior-qa
      source: "skill://senior-qa"
      role: "Risk-ranked validation, verification report structure"
      phases: [verification]
      wave: 1
      status: active
      version: "1.0.0"
    - skill: code-reviewer
      source: "skill://code-reviewer"
      role: "Pre-closeout correctness gate for generated TypeScript"
      phases: [closeout]
      wave: 1
      status: active
      version: "1.0.0"
    - skill: font-sync
      source: "skill://font-sync"
      role: "Font specimen generation, R2 upload, font-family validation"
      phases: [post-generation]
      wave: 1
      status: active
      version: "1.0.0"
  owned:
